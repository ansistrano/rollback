name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          ansible-galaxy collection install ansible.posix
          sudo ansible-galaxy role install -f -p /etc/ansible/roles ansistrano.deploy
          sudo ln -sfn "$GITHUB_WORKSPACE" /etc/ansible/roles/local-ansistrano

      - name: Run syntax check
        run: |
          printf 'localhost ansible_connection=local\n' > inventory
          ANSIBLE_ROLES_PATH=/etc/ansible/roles ansible-playbook -i inventory --syntax-check test/test.yml

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          ansible-galaxy collection install ansible.posix
          sudo ansible-galaxy role install -f -p /etc/ansible/roles ansistrano.deploy
          sudo ln -sfn "$GITHUB_WORKSPACE" /etc/ansible/roles/local-ansistrano

      - name: Run integration tests
        run: |
          printf 'localhost ansible_connection=local\n' > inventory
          ANSIBLE_ROLES_PATH=/etc/ansible/roles ansible-playbook -i inventory --connection=local --become -e update_cache=1 -v test/deploy.yml
          ANSIBLE_ROLES_PATH=/etc/ansible/roles ansible-playbook -i inventory --connection=local --become -e update_cache=1 -v test/test.yml
